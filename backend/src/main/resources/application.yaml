ktor:
  deployment:
    port: 8080
    host: 0.0.0.0
  application:
    modules:
      - cl.frutapp.backend.ApplicationKt.module

app:
  version: "0.1.0"

# Sustitución por env var con default para desarrollo local: "$VAR:default".
# En producción (Contabo) se inyectan DB_* y JWT_SECRET por entorno; nunca en código.
db:
  host: "$DB_HOST:localhost"
  port: "$DB_PORT:5432"
  name: "$DB_NAME:frutapp"
  user: "$DB_USER:frutapp"
  password: "$DB_PASSWORD:frutapp"
  maxPoolSize: "$DB_MAX_POOL_SIZE:5"

# Correo (Resend). RESEND_API_KEY se inyecta por env / GitHub secret; vacío => modo demo
# (LogEmailSender, sin envío real). MAIL_FROM debe usar el dominio verificado en Resend.
mail:
  resendApiKey: "$RESEND_API_KEY:"
  from: "$MAIL_FROM:FrutApp <onboarding@resend.dev>"

# Storage S3-compatible (MinIO). Si todas las STORAGE_* faltan, avatar queda
# deshabilitado y el backend sigue funcionando. `endpoint` lo ve el backend
# por la red docker interna; `publicEndpoint` se usa para firmar URLs que la
# app abrirá (en QA: frutapp-storage.grandline.cl detrás de Traefik).
storage:
  endpoint: "$STORAGE_ENDPOINT:http://localhost:9000"
  publicEndpoint: "$STORAGE_PUBLIC_ENDPOINT:http://10.0.2.2:9000"
  accessKey: "$STORAGE_ACCESS_KEY:frutapp"
  secretKey: "$STORAGE_SECRET_KEY:frutapp-dev"
  bucket: "$STORAGE_BUCKET:frutapp"

# Demo: auto-avance de pedidos por el camino feliz (solo QA/demo; en producción real = false).
demo:
  autoAdvance: "$DEMO_AUTO_ADVANCE:false"
  autoAdvanceSeconds: "$DEMO_AUTO_ADVANCE_SECONDS:45"

jwt:
  secret: "$JWT_SECRET:dev-insecure-secret-cambiar-en-produccion"
  issuer: "$JWT_ISSUER:frutapp-api"
  audience: "$JWT_AUDIENCE:frutapp-app"
  realm: "$JWT_REALM:frutapp"
  accessTtlMinutes: "$JWT_ACCESS_TTL_MIN:15"
  refreshTtlDays: "$JWT_REFRESH_TTL_DAYS:60"
