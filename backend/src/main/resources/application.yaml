ktor:
  deployment:
    port: 8080
    host: 0.0.0.0
  application:
    modules:
      - cl.frutapp.backend.ApplicationKt.module

app:
  version: "0.1.0"

# Sustitución por env var con default para desarrollo local: "$VAR:default".
# En producción (Contabo) se inyectan DB_* y JWT_SECRET por entorno; nunca en código.
db:
  host: "$DB_HOST:localhost"
  port: "$DB_PORT:5432"
  name: "$DB_NAME:frutapp"
  user: "$DB_USER:frutapp"
  password: "$DB_PASSWORD:frutapp"
  maxPoolSize: "$DB_MAX_POOL_SIZE:5"

jwt:
  secret: "$JWT_SECRET:dev-insecure-secret-cambiar-en-produccion"
  issuer: "$JWT_ISSUER:frutapp-api"
  audience: "$JWT_AUDIENCE:frutapp-app"
  realm: "$JWT_REALM:frutapp"
  accessTtlMinutes: "$JWT_ACCESS_TTL_MIN:15"
  refreshTtlDays: "$JWT_REFRESH_TTL_DAYS:60"
