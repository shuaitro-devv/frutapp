name: Deploy Backend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/deploy-backend.yml'
  # Re-trigger manual desde la pestaña Actions (util tras agregar/rotar un secret
  # sin necesidad de un commit trivial). Ver: Actions → Deploy Backend → Run workflow.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend
  CONTAINER_NAME: frutapp-backend
  HOST_RULE: frutapp-api.grandline.cl

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Run backend tests (Postgres efímero via Testcontainers)
        run: |
          chmod +x ./gradlew
          ./gradlew :backend:test --no-daemon --console=plain

      - name: Upload test report (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test
          if-no-files-found: ignore

  build-and-deploy:
    needs: test          # no despliega si los tests fallan
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Reemplaza docker/metadata-action@v5 (fallaba con HTTP 500 sirviendo la
      # respuesta HTML "Unicorn!" de GitHub, ver runs 29538219448 y 29539865515).
      # Calculamos los tags/labels a mano — sin llamadas al API de GitHub, no
      # hay dependencias externas que puedan tumbar el step.
      - name: Compute image tags and labels
        id: meta
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          BRANCH="${GITHUB_REF_NAME}"
          {
            echo "tags<<EOF"
            echo "${IMG}:${BRANCH}"
            echo "${IMG}:${SHA_SHORT}"
            if [ "${BRANCH}" = "main" ]; then echo "${IMG}:latest"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "==> Login a GHCR"
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Asegurar red docker 'web' (Traefik)"
            docker network inspect web >/dev/null 2>&1 || docker network create web

            echo "==> Asegurar red interna 'frutapp' (DB privada)"
            docker network inspect frutapp >/dev/null 2>&1 || docker network create frutapp

            echo "==> Pull nueva imagen backend (con reintentos por flakiness de red)"
            for attempt in 1 2 3 4 5; do
              if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest; then
                echo "Pull exitoso en intento $attempt"
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "ERROR: pull fallo despues de 5 intentos"
                exit 1
              fi
              echo "Pull intento $attempt fallo (probable network reset). Reintentando en 10s..."
              sleep 10
            done

            echo "==> Asegurar Postgres FrutApp (si aun no existe)"
            if ! docker ps -a --format '{{.Names}}' | grep -q '^frutapp-postgres$'; then
              docker run -d \
                --name frutapp-postgres \
                --restart unless-stopped \
                --network frutapp \
                -e POSTGRES_DB=frutapp \
                -e POSTGRES_USER=frutapp \
                -e POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
                -v frutapp-postgres-data:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "Postgres creado. Esperando 10s a que arranque..."
              sleep 10
            else
              echo "Postgres ya existe, OK."
            fi

            echo "==> Parar y eliminar backend anterior"
            docker stop frutapp-backend 2>/dev/null || true
            docker rm frutapp-backend 2>/dev/null || true

            echo "==> Lanzar nuevo backend"
            docker run -d \
              --name frutapp-backend \
              --restart unless-stopped \
              --network web \
              -e APP_ENV=production \
              -e DB_HOST=frutapp-postgres \
              -e DB_PORT=5432 \
              -e DB_NAME=frutapp \
              -e DB_USER=frutapp \
              -e DB_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e MAIL_FROM='FrutApp <no-reply@frutapp.grandline.cl>' \
              -e FIREBASE_SERVICE_ACCOUNT_JSON='${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' \
              -e STORAGE_ENDPOINT='http://frutapp-minio:9000' \
              -e STORAGE_PUBLIC_ENDPOINT='https://frutapp-storage.grandline.cl' \
              -e STORAGE_ACCESS_KEY='${{ secrets.STORAGE_ACCESS_KEY }}' \
              -e STORAGE_SECRET_KEY='${{ secrets.STORAGE_SECRET_KEY }}' \
              -e STORAGE_BUCKET='frutapp' \
              -e DEMO_AUTO_ADVANCE='false' \
              -e DEMO_AUTO_ADVANCE_SECONDS='15' \
              -e WEBPAY_RETURN_URL_BASE='https://frutapp-api.grandline.cl' \
              -v frutapp-logs:/app/logs \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.frutapp-backend.rule=Host(\`frutapp-api.grandline.cl\`)" \
              --label "traefik.http.routers.frutapp-backend.entrypoints=websecure" \
              --label "traefik.http.routers.frutapp-backend.tls.certresolver=letsencrypt" \
              --label "traefik.http.services.frutapp-backend.loadbalancer.server.port=8080" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "==> Conectar backend a red frutapp (para acceder a Postgres)"
            docker network connect frutapp frutapp-backend

            echo "==> Estado del contenedor"
            docker ps --filter "name=frutapp-backend" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "==> Limpiar imagenes viejas"
            docker image prune -f

      - name: Verify deployment
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "==> docker ps -a (frutapp)"
            docker ps -a --filter "name=frutapp" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

            echo ""
            echo "==> Esperar 10s para que arranque"
            sleep 10

            echo ""
            echo "==> Logs del backend (ultimas 40 lineas)"
            docker logs frutapp-backend --tail 40 2>&1 || echo "Container frutapp-backend no existe."
